<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kali Shared</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #1a1a1a;
      padding: 1rem 2rem;
      display: flex;
      gap: 2rem;
      justify-content: center;
    }
    nav a { color: #00e5ff; text-decoration: none; font-size: 0.95rem; }
    nav a:hover { color: #fff; }
    h1 { font-size: 3.5rem; color: #00e5ff; letter-spacing: 3px; }
    p { margin-top: 1rem; color: #888; font-size: 1.1rem; }
    .search-bar {
      margin-top: 2rem;
      display: flex;
      gap: 0.5rem;
    }
    input {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 0.7rem 1.2rem;
      border-radius: 4px;
      font-size: 1rem;
      outline: none;
      width: 280px;
    }
    input:focus { border-color: #00e5ff; }
    button {
      background: #00e5ff;
      color: #0f0f0f;
      border: none;
      padding: 0.7rem 1.4rem;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #00b8d4; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="assets.html">Assets</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="admin.html">Admin</a>
  </nav>
  <h1>Kali Shared</h1>
  <p>Centralized hub for tools, files, and resources.</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search a page (e.g. about, contact)..." />
    <button onclick="searchPage()">Go</button>
  </div>

  <script>
    function searchPage() {
      var query = document.getElementById('searchInput').value.trim().toLowerCase();
      if (query == 'about') { location.href = 'about.html'; }
      else if (query == 'contact') { location.href = 'contact.html'; }
      else if (query == 'assets') { location.href = 'assets.html'; }
      else if (query == 'dashboard') { location.href = 'dashboard.html'; }
      else if (query == 'admin') { location.href = 'admin.html'; }
      else if (query == 'index' || query == 'home') { location.href = 'index.html'; }
      else { location.href = '404.html'; }
    }
  </script>
</body>
</html>
