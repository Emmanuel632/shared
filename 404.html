<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .error h1 { font-size: 6rem; color: #00e5ff; letter-spacing: 4px; }
    .error h2 { font-size: 1.5rem; color: #e0e0e0; margin-top: 0.5rem; }
    .error p { margin-top: 1rem; font-size: 1rem; color: #888; }
    .page-name { color: #00e5ff; font-weight: bold; }
    .error a {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      background: #00e5ff;
      color: #0f0f0f;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }
    .error a:hover { background: #00b8d4; }
  </style>
</head>
<body>
  <div class="error">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page <span class="page-name" id="pageName"></span> doesn't exist.</p>
    <a href="index.html">Go Home</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const page = params.get('page');
    const el = document.getElementById('pageName');
    el.textContent = page ? '"' + page + '"' : 'you requested';
  </script>
</body>
</html>
