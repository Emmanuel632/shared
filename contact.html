<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      color: #00e5ff;
      letter-spacing: 2px;
    }

    .hero p {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #888;
    }

    form {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 300px;
    }

    input,
    textarea {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 0.7rem 1rem;
      border-radius: 4px;
      font-size: 1rem;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: #00e5ff;
    }

    textarea {
      resize: vertical;
      height: 100px;
    }

    button {
      background: #00e5ff;
      color: #0f0f0f;
      border: none;
      padding: 0.7rem;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #00b8d4;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #1a1a1a;
      padding: 1rem 2rem;
      display: flex;
      gap: 2rem;
      justify-content: center;
    }

    nav a {
      color: #00e5ff;
      text-decoration: none;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #fff;
    }
  </style>
</head>

<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="assets.html">Assets</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="admin.html">Admin</a>
  </nav>
  <div class="hero">
    <h1>Contact</h1>
    <p>Get in touch with us below.</p>
    <form>
      <input type="text" placeholder="Name">
      <input type="email" placeholder="Email">
      <textarea placeholder="Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </div>
</body>

</html>
